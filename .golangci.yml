version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - misspell
    - revive
    - unconvert
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters
        - name: package-comments
